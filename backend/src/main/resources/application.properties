spring.application.name=shopwave-monolith

# ─── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shopwave}
spring.datasource.username=${DB_USER:shopwave}
spring.datasource.password=${DB_PASSWORD:shopwave}
spring.datasource.driver-class-name=org.postgresql.Driver
# ─── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Server ──────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.shopwave=INFO
logging.level.org.springframework.web=INFO

# ─── Lab Latency ──────────────────────────────────────────────
lab.latency.enabled=true
lab.latency.jitterMs=100
lab.latency.delayMs=5000
